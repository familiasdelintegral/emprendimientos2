<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familias del Integral</title>
<meta http-equiv="refresh" content="0; url=emprendimientos/">
<link rel="canonical" href="emprendimientos/">
<meta name="robots" content="noindex">
<style>
  :root{
    --blue-deep:#0a2a7a;
    --blue:#1450c9;
    --bg:#f5f7fb;
    --ink:#1c2333;
    --ink-soft:#5b6478;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    text-align:center;
    padding:24px;
  }
  .box p{color:var(--ink-soft);font-size:0.95rem;margin:4px 0;}
  .box a{color:var(--blue);font-weight:700;text-decoration:none;}
  .box a:hover{color:var(--blue-deep);}
</style>
</head>
<body>
  <div class="box">
    <p>Redirigiendo al directorio de la comunidad…</p>
    <p><a href="emprendimientos/">Si no fuiste redirigido, hacé clic acá</a></p>
  </div>
</body>
